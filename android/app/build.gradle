apply plugin: "com.android.application"
apply plugin: "kotlin-android"

project.ext.vectoricons = [
    iconFontNames: [ 'MaterialCommunityIcons.ttf' ]
]

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

// Read signing credentials from local.properties (never commit this file)
def localProps = new Properties()
def localPropsFile = rootProject.file("local.properties")
if (localPropsFile.exists()) {
    localProps.load(new FileInputStream(localPropsFile))
}

android {
    namespace "com.focusgate"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.focusgate"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode = project.hasProperty('versionCode') ? versionCode.toInteger() : 1
        versionName = project.hasProperty('versionName') ? versionName : "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            def keystorePath = localProps.getProperty('RELEASE_STORE_FILE', '')
            if (keystorePath) {
                storeFile file(keystorePath)
                storePassword localProps.getProperty('RELEASE_STORE_PASSWORD', '')
                keyAlias    localProps.getProperty('RELEASE_KEY_ALIAS', '')
                keyPassword localProps.getProperty('RELEASE_KEY_PASSWORD', '')
            } else {
                // Fallback to debug signing so the project still builds without creds
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources false  // keep false until JS bundle shrinking is validated
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }
}

dependencies {
    implementation("com.facebook.react:react-android:0.73.2")
    implementation("com.facebook.react:hermes-android:0.73.2")
    implementation("androidx.core:core-splashscreen:1.0.1")
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
