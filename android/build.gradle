buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 24
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle:8.13.2')
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    configurations.all {
        resolutionStrategy {
            dependencySubstitution {
                substitute module("com.facebook.react:react-native") using module("com.facebook.react:react-android:0.73.2")
            }
            force "com.facebook.react:react-android:0.73.2"
            force "com.facebook.react:hermes-android:0.73.2"
            force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
            force "org.jetbrains.kotlin:kotlin-reflect:1.9.22"
        }
    }
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            jvmTarget = "1.8"
        }
    }
}

subprojects { subproject ->
    afterEvaluate {
        if (subproject.name == "react-native-vector-icons") {
            def androidExt = subproject.extensions.findByName("android")
            if (androidExt != null) {
                androidExt.buildFeatures.buildConfig = true
            }
        }
    }
}
