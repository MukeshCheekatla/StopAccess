<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FocusGate</title>
  <style>
    :root {
      --bg: #0A0A0F;
      --card: #14141C;
      --border: #2A2A3A;
      --text: #F0F0FF;
      --muted: #6B6B8A;
      --accent: #7C6FF7;
      --green: #00C48C;
      --red: #FF4757;
      --yellow: #FFB800;
      --glass: rgba(30, 30, 46, 0.8);
      --sidebar-width: 180px; /* Refined for Extension */
    }

    * { box-sizing: border-box; }

    body {
      width: 760px; /* Slightly tighter */
      height: 500px; /* Slightly tighter */
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      overflow: hidden;
      font-size: 13px; /* Extension-grade density */
    }

    .row { display: flex; align-items: center; justify-content: space-between; }
    .col { display: flex; flex-direction: column; }
    .gap-4 { gap: 4px; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }

    /* Sidebar Layout */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 16px; /* Tighter padding */
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-container {
      width: 28px;
      height: 28px;
    }

    .app-title { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }

    .nav-menu { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 2px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px; /* Tighter padding */
      border-radius: 8px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 600;
      font-size: 13px;
    }
    .nav-item:hover { background: rgba(255, 255, 255, 0.03); color: var(--text); }
    .nav-item:active { transform: scale(0.97); }
    .nav-item.active { background: rgba(124, 111, 247, 0.1); color: var(--accent); }

    .nav-item svg { width: 18px; height: 18px; opacity: 0.8; }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      opacity: 0.4;
    }

    /* Main Content Area */
    .main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .content-header {
      height: 52px; /* Tighter Header */
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 10, 15, 0.5);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .page-title { font-size: 14px; font-weight: 700; color: var(--text); }

    .badge {
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .badge-active {
      background: rgba(0, 196, 140, 0.1);
      color: var(--green);
      border: 1px solid rgba(0, 196, 140, 0.2);
    }

    #mainContent {
      flex: 1;
      overflow-y: auto;
      padding: 20px; /* Dense Padding */
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      transition: opacity 0.15s ease;
    }

    #mainContent::-webkit-scrollbar { width: 6px; }
    #mainContent::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* Component Architecture - Extension Optimized */
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      text-align: center;
      gap: 12px;
      background: rgba(255,255,255,0.01);
      border-radius: 16px;
      border: 1px dashed var(--border);
    }

    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px; /* Tighter corners */
      padding: 12px; /* Denser Layout */
      margin-bottom: 10px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .app-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .app-card:active { transform: scale(0.98); }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px; /* Tighter Stats */
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-val { font-size: 20px; font-weight: 800; color: var(--text); }
    .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

    .section-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      margin-top: 18px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .chart-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      height: 160px; /* Reduced Height */
      display: flex;
      flex-direction: column;
    }

    .bar-chart { flex: 1; display: flex; align-items: flex-end; gap: 6px; margin-top: 8px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .bar-track {
      width: 100%;
      height: 80px;
      background: rgba(255,255,255,0.02);
      border-radius: 3px;
    }
    .bar-fill {
      width: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0.3;
    }
    .bar-fill.active { opacity: 1; box-shadow: 0 0 10px rgba(124, 111, 247, 0.4); }
    .bar-label { font-size: 9px; color: var(--muted); font-weight: 700; }

    .dash-hero {
      background: linear-gradient(135deg, rgba(124, 111, 247, 0.12) 0%, rgba(10, 10, 15, 0) 100%);
      border: 1px solid rgba(124, 111, 247, 0.15);
      border-radius: 16px;
      padding: 14px; /* Dense Hero */
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hero-info .title { font-size: 15px; font-weight: 900; margin-bottom: 2px; }
    .hero-info .sub { font-size: 11px; color: var(--muted); }

    .hero-stat .val { font-size: 28px; font-weight: 900; color: var(--accent); }
    .hero-stat .lbl { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; }

    /* Shield Status (Trust Signal) */
    .shield-status {
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--border);
      background: rgba(20, 20, 28, 0.4);
    }
    .shield-icon { font-size: 20px; }
    .shield-info .shield-title { font-size: 13px; font-weight: 800; }
    .shield-info .shield-sync { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .shield-active { border-color: rgba(0, 196, 140, 0.3); background: rgba(0, 196, 140, 0.05); }
    .shield-active .shield-title { color: var(--green); }
    .shield-error { border-color: rgba(255, 71, 87, 0.3); background: rgba(255, 71, 87, 0.05); }
    .shield-error .shield-title { color: var(--red); }
    .shield-inactive { border-color: var(--border); }

    .btn-group { display: flex; gap: 8px; margin-bottom: 24px; }
    .btn-tab {
      flex: 1;
      padding: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }
    .btn-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .service-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .service-card.active { border-color: var(--accent); background: rgba(124, 111, 247, 0.05); }
    .service-card .name { font-size: 12px; font-weight: 600; flex: 1; }
    .service-card .check { color: var(--muted); }
    .service-card.active .check { color: var(--accent); }

    .app-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
    }

    .app-icon-fallback {
      font-family: "Segoe UI", sans-serif;
      letter-spacing: 0.4px;
    }

    .toggle-switch-btn {
      min-width: 58px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .toggle-switch-btn.active {
      background: rgba(0, 196, 140, 0.14);
      color: var(--green);
      border-color: rgba(0, 196, 140, 0.35);
      box-shadow: 0 0 0 1px rgba(0, 196, 140, 0.12) inset;
    }

    .toggle-switch-btn:disabled {
      opacity: 0.45;
      cursor: wait;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* UI Components */
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .input {
      background: #1A1A26;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      width: 100%;
      outline: none;
      font-size: 13px;
    }

    /* Modals */
    .modal-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-height: 90%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .modal-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 14px; font-weight: 800; }
    .modal-content { flex: 1; overflow-y: auto; padding: 16px; }
    .modal-footer { padding: 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-container">
        <img src="../assets/icon.png" width="28" height="28" alt="Logo" style="border-radius: 6px;">
      </div>
      <div class="app-title">FocusGate</div>
    </div>

    <div class="nav-menu">

        <span>Settings</span>
      </div>
    </div>

    <div class="sidebar-footer">
      FocusGate Pro v1.0.0
    </div>
  </div>

  <div class="main-wrapper">
    <div class="content-header">
      <div id="pageTitle" class="page-title">Dashboard</div>
      <div class="status-area">
        <div id="statusBadge" class="badge badge-active">SHIELD ACTIVE</div>
      </div>

    <div id="mainContent">
      <!-- Content Injected Here -->
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
