<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FocusGate</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --bg: #08080F;
      --card: #111119;
      --card2: #16161F;
      --border: #22223A;
      --text: #EDEDFF;
      --muted: #5A5A78;
      --accent: #7C6FF7;
      --accent-glow: rgba(124, 111, 247, 0.2);
      --green: #00C48C;
      --red: #FF4757;
      --yellow: #FFB800;
      --sidebar-w: 172px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 720px;
      height: 480px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      overflow: hidden;
      font-size: 13px;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-brand {
      padding: 18px 16px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .brand-logo {
      width: 26px; height: 26px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), #5B4FE8);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--text);
    }

    .nav-list {
      flex: 1;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active {
      background: rgba(124,111,247,0.12);
      color: var(--accent);
    }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 6px 8px;
    }

    .sidebar-bottom {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .version-tag {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { color: var(--accent); background: var(--accent-glow); }
    .icon-btn svg { width: 15px; height: 15px; }

    /* ── Main Area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 48px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,15,0.6);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .page-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .status-pill {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-pill.active {
      background: rgba(0,196,140,0.08);
      border-color: rgba(0,196,140,0.25);
      color: var(--green);
    }
    .status-pill.error {
      background: rgba(255,71,87,0.08);
      border-color: rgba(255,71,87,0.25);
      color: var(--red);
    }

    #mainContent {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #mainContent::-webkit-scrollbar { width: 4px; }
    #mainContent::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Shared Components ── */
    .loader {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100% {opacity:0.3} 50% {opacity:1} }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 180px;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.01);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(124,111,247,0.3); }

    .section-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 10px;
      margin-top: 14px;
    }
    .section-label:first-child { margin-top: 0; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .stat-val { font-size: 22px; font-weight: 900; }
    .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }

    .shield-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      margin-bottom: 14px;
    }
    .shield-icon { font-size: 18px; }
    .shield-label { font-size: 12px; font-weight: 800; }
    .shield-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .shield-bar.active { border-color: rgba(0,196,140,0.3); background: rgba(0,196,140,0.04); }
    .shield-bar.active .shield-label { color: var(--green); }
    .shield-bar.error { border-color: rgba(255,71,87,0.25); background: rgba(255,71,87,0.04); }
    .shield-bar.error .shield-label { color: var(--red); }

    .domain-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .domain-row:last-child { border-bottom: none; }
    .domain-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .domain-icon { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; }
    .domain-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .domain-sessions { font-size: 10px; color: var(--muted); }
    .domain-time { font-size: 11px; font-weight: 800; color: var(--muted); flex-shrink: 0; }

    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .app-icon {
      width: 26px; height: 26px;
      border-radius: 7px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .app-icon-fallback {
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800;
    }

    /* Toggle buttons */
    .toggle-switch-btn {
      min-width: 56px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.6px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .toggle-switch-btn.active {
      background: rgba(0,196,140,0.12);
      color: var(--green);
      border-color: rgba(0,196,140,0.3);
    }
    .toggle-switch-btn:disabled { opacity: 0.4; cursor: wait; }

    /* Buttons */
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 18px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.97); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .btn-tab {
      flex: 1;
      padding: 7px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .btn-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-group { display: flex; gap: 6px; margin-bottom: 16px; }

    /* Input */
    .input {
      background: #14141F;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 9px;
      font-size: 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--accent); }

    /* Service grid */
    .service-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .service-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .service-card.active { border-color: var(--accent); background: rgba(124,111,247,0.06); }
    .service-card .name { font-size: 12px; font-weight: 600; flex: 1; }

    /* Bar chart */
    .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin-bottom: 8px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
    .bar-track { flex: 1; width: 100%; background: rgba(255,255,255,0.02); border-radius: 3px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
    .bar-fill { width: 100%; background: var(--accent); border-radius: 2px; opacity: 0.3; transition: height 0.5s ease; }
    .bar-fill.active { opacity: 1; }
    .bar-label { font-size: 8px; color: var(--muted); font-weight: 700; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-height: 85%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }
    .modal-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 14px; font-weight: 800; }
    .modal-content { flex: 1; overflow-y: auto; padding: 16px; }
    .modal-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

    /* New User Welcome */
    .welcome-banner {
      background: linear-gradient(135deg, rgba(124,111,247,0.12), rgba(91,79,232,0.06));
      border: 1px solid rgba(124,111,247,0.25);
      border-radius: 14px;
      padding: 20px 18px;
      margin-bottom: 14px;
      text-align: center;
    }
    .welcome-emoji { font-size: 28px; margin-bottom: 8px; }
    .welcome-title { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
    .welcome-sub { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 16px; max-width: 280px; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">🛡️</div>
      <div class="brand-name">FocusGate</div>
    </div>

    <nav class="nav-list">
      <div class="nav-item active" data-tab="dash">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </div>

      <div class="nav-item" data-tab="apps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/>
          <path d="M12 8v4l3 3"/>
        </svg>
        <span>Block Rules</span>
      </div>

      <div class="nav-item" data-tab="focus">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="5"/>
          <circle cx="12" cy="12" r="1" fill="currentColor"/>
        </svg>
        <span>Focus Mode</span>
      </div>

      <div class="nav-item" data-tab="schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Schedule</span>
      </div>

      <div class="nav-item" data-tab="insights">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>Insights</span>
      </div>
    </nav>

    <div class="sidebar-bottom">
      <span class="version-tag">v1.0</span>
      <button id="btn_open_settings" class="icon-btn" title="Settings (opens full page)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="topbar">
      <div id="pageTitle" class="page-label">Dashboard</div>
      <div id="statusBadge" class="status-pill">Checking...</div>
    </div>
    <div id="mainContent">
      <div class="loader">Loading...</div>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
