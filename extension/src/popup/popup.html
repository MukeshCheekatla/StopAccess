<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>StopAccess</title>
  <link rel="stylesheet" href="../tailwind.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    :root {
      --bg-dark: #101012;
      --bg-card: #18181b;
      --accent: #2f2f35;
      --accent-soft: rgba(255, 255, 255, 0.06);
      --glass-border: #2b2b31;
      --text: #f5f5f5;
      --muted: #9b9ba1;
      --green: #15803d;
      --red: #b91c1c;
      --yellow: #a16207;
    }

    /* Global reset and fixed shell dimensions (critical for Chrome Extensions) */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 540px;
      height: 480px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.03), transparent 22%),
        linear-gradient(180deg, #111113, #0d0d0f);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #root {
      display: flex;
      flex: 1;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="popup.js" type="module"></script>
</body>
</html>
