<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FocusGate — Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --bg: #08080F;
      --card: #111119;
      --card2: #16161F;
      --border: #22223A;
      --text: #EDEDFF;
      --muted: #5A5A78;
      --accent: #7C6FF7;
      --accent-glow: rgba(124,111,247,0.18);
      --green: #00C48C;
      --red: #FF4757;
      --yellow: #FFB800;
      --sidebar-w: 220px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100vh; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-brand {
      padding: 28px 22px 20px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .brand-logo {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), #5B4FE8);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .brand-name { font-size: 18px; font-weight: 800; letter-spacing: -0.4px; }
    .brand-tagline { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 1px; }

    .nav-list { flex: 1; padding: 14px 10px; display: flex; flex-direction: column; gap: 3px; }

    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 14px; border-radius: 10px;
      cursor: pointer; color: var(--muted);
      font-size: 14px; font-weight: 600;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active { background: rgba(124,111,247,0.12); color: var(--accent); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-item .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); margin-left: auto;
    }

    .nav-divider { height: 1px; background: var(--border); margin: 8px 10px; }

    .sidebar-footer {
      padding: 16px 22px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
    }

    /* ── Main ── */
    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    .topbar {
      height: 64px; padding: 0 36px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,15,0.6);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .page-label { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }

    .status-pill {
      padding: 5px 14px; border-radius: 20px;
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.8px; text-transform: uppercase;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-pill.active {
      background: rgba(0,196,140,0.08);
      border-color: rgba(0,196,140,0.25);
      color: var(--green);
    }
    .status-pill.error {
      background: rgba(255,71,87,0.08);
      border-color: rgba(255,71,87,0.25);
      color: var(--red);
    }

    #mainContent {
      flex: 1; overflow-y: auto;
      padding: 36px; max-width: 920px; margin: 0 auto; width: 100%;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    #mainContent::-webkit-scrollbar { width: 5px; }
    #mainContent::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Shared Components (used by all screen JS) ── */
    .loader {
      height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: var(--muted);
      letter-spacing: 2px; text-transform: uppercase;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 200px; gap: 12px;
      color: var(--muted); text-align: center;
      border: 1px dashed var(--border); border-radius: 16px;
      background: rgba(255,255,255,0.01);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(124,111,247,0.3); }

    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 10px;
      transition: border-color 0.2s, transform 0.15s;
    }
    .app-card:hover { border-color: rgba(124,111,247,0.3); transform: translateY(-1px); }

    .section-title {
      font-size: 11px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 14px; margin-top: 22px;
    }
    .section-title:first-child { margin-top: 0; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-bottom: 18px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
    }
    .stat-val { font-size: 26px; font-weight: 900; }
    .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.9px; margin-top: 3px; }

    .shield-status {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--card); margin-bottom: 18px;
    }
    .shield-icon { font-size: 22px; }
    .shield-title { font-size: 14px; font-weight: 800; }
    .shield-sync { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .shield-active { border-color: rgba(0,196,140,0.3); background: rgba(0,196,140,0.04); }
    .shield-active .shield-title { color: var(--green); }
    .shield-error { border-color: rgba(255,71,87,0.25); background: rgba(255,71,87,0.04); }
    .shield-error .shield-title { color: var(--red); }

    .btn-group { display: flex; gap: 8px; margin-bottom: 20px; }
    .btn-tab {
      flex: 1; padding: 9px; background: var(--card);
      border: 1px solid var(--border); color: var(--muted);
      border-radius: 10px; font-size: 12px; font-weight: 700;
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .btn-tab.active { background: var(--accent); color:#fff; border-color: var(--accent); }

    .service-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
    .service-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      transition: border-color 0.15s;
    }
    .service-card.active { border-color: var(--accent); background: rgba(124,111,247,0.06); }
    .service-card .name { font-size: 13px; font-weight: 600; flex: 1; }

    .app-icon {
      width: 32px; height: 32px; border-radius: 9px;
      object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .app-icon-fallback {
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800;
    }

    .toggle-switch-btn {
      min-width: 62px; height: 32px; border-radius: 999px;
      border: 1px solid var(--border); background: rgba(255,255,255,0.04);
      color: var(--muted); font-size: 10px; font-weight: 800;
      letter-spacing: 0.7px; cursor: pointer; transition: all 0.2s;
      flex-shrink: 0;
    }
    .toggle-switch-btn.active {
      background: rgba(0,196,140,0.12); color: var(--green);
      border-color: rgba(0,196,140,0.35);
    }
    .toggle-switch-btn:disabled { opacity: 0.4; cursor: wait; }

    .btn {
      background: var(--accent); color: #fff; border: none;
      padding: 10px 20px; border-radius: 10px;
      font-weight: 700; font-size: 13px; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: default; }

    .btn-outline {
      background: transparent; border: 1px solid var(--border);
      color: var(--text); padding: 9px 18px; border-radius: 10px;
      font-weight: 700; font-size: 13px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .input {
      background: #14141F; border: 1px solid var(--border);
      color: var(--text); padding: 11px 15px; border-radius: 10px;
      font-size: 13px; width: 100%; outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--accent); }

    .search-bar { margin-bottom: 18px; }
    .app-list { display: flex; flex-direction: column; }

    .bar-chart { display: flex; align-items: flex-end; gap: 5px; height: 96px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; height: 100%; }
    .bar-track { flex: 1; width: 100%; background: rgba(255,255,255,0.02); border-radius: 4px; display: flex; flex-direction: column; justify-content: flex-end; }
    .bar-fill { width: 100%; background: var(--accent); border-radius: 3px; opacity: 0.3; transition: height 0.5s ease; }
    .bar-fill.active { opacity: 1; }
    .bar-label { font-size: 9px; color: var(--muted); font-weight: 700; }

    .badge { padding: 3px 10px; border-radius: 20px; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-active { background: rgba(0,196,140,0.1); color: var(--green); border: 1px solid rgba(0,196,140,0.2); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 18px; width: 100%; max-width: 560px;
      max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
    }
    .modal-header {
      padding: 18px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 800; }
    .modal-content { flex: 1; overflow-y: auto; padding: 20px; }
    .modal-footer {
      padding: 16px 20px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
    }

    /* btn-tab used within modals for log filters */
    .btn-tab { outline: none; }
    .log-filter { flex: unset; }

    /* Rule-card scope badge */
    .rule-card { display: flex; flex-direction: column; gap: 10px; }
    .delete-rule { padding: 6px 10px; }

    /* Welcome state */
    .welcome-banner {
      background: linear-gradient(135deg, rgba(124,111,247,0.1), rgba(91,79,232,0.04));
      border: 1px solid rgba(124,111,247,0.22);
      border-radius: 16px; padding: 28px 24px;
      margin-bottom: 18px; text-align: center;
    }
    .welcome-emoji { font-size: 36px; margin-bottom: 10px; }
    .welcome-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
    .welcome-sub {
      font-size: 13px; color: var(--muted); line-height: 1.6;
      margin-bottom: 20px; max-width: 340px; margin-left: auto; margin-right: auto;
    }
    .shield-bar {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; border-radius: 14px;
      border: 1px solid var(--border); background: var(--card);
      margin-bottom: 18px;
    }
    .shield-bar.active { border-color: rgba(0,196,140,0.3); background: rgba(0,196,140,0.04); }
    .shield-bar.active .shield-label { color: var(--green); }
    .shield-bar.error { border-color: rgba(255,71,87,0.25); background: rgba(255,71,87,0.04); }
    .shield-bar.error .shield-label { color: var(--red); }
    .shield-label { font-size: 14px; font-weight: 800; }
    .shield-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .stats-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 16px; }
    .domain-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .domain-row:last-child { border-bottom: none; }
    .domain-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .domain-icon { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; }
    .domain-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .domain-sessions { font-size: 11px; color: var(--muted); }
    .domain-time { font-size: 12px; font-weight: 800; color: var(--muted); flex-shrink: 0; }
    .section-label { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 12px; margin-top: 18px; }
    .section-label:first-child { margin-top: 0; }

    /* Settings health */
    .healthItem { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .healthItem:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">🛡️</div>
      <div>
        <div class="brand-name">FocusGate</div>
        <div class="brand-tagline">Deep Work Engine</div>
      </div>
    </div>

    <nav class="nav-list">
      <div class="nav-item active" data-tab="dash">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </div>
      <div class="nav-item" data-tab="apps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="8" rx="2"/>
          <rect x="2" y="14" width="20" height="8" rx="2"/>
          <line x1="6" y1="6" x2="6.01" y2="6"/>
          <line x1="6" y1="18" x2="6.01" y2="18"/>
        </svg>
        Block Rules
      </div>
      <div class="nav-item" data-tab="focus">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="5"/>
          <circle cx="12" cy="12" r="1" fill="currentColor"/>
        </svg>
        Focus Mode
      </div>
      <div class="nav-item" data-tab="schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Schedule
      </div>
      <div class="nav-item" data-tab="insights">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Insights
      </div>

      <div class="nav-divider"></div>

      <div class="nav-item" data-tab="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </div>
    </nav>

    <div class="sidebar-footer">FocusGate v1.0.0</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div id="pageTitle" class="page-label">Dashboard</div>
      <div id="statusBadge" class="status-pill">Checking…</div>
    </div>
    <div id="mainContent">
      <div class="loader">Loading…</div>
    </div>
  </div>

  <script src="dashboard.js" type="module"></script>
</body>
</html>
