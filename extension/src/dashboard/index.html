<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FocusGate | Dashboard</title>
  <link rel="stylesheet" href="tailwind.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    :root {
      --bg-dark: #212121;
      --bg-card: #2f2f2f;
      --accent-soft: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text: #ececec;
      --muted: #8e8ea0;
      --green: #10b981;
      --red:   #ef4444;
      --yellow: #f59e0b;

      --sidebar-w: 272px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

    button {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      background: none;
      box-shadow: none;
      cursor: pointer;
      font-family: inherit;
      outline: none;
    }

    html, body {
      width: 100%; height: 100vh;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--fg-bg);
      color: var(--fg-text);
      display: flex;
      overflow: hidden;
      font-size: 14px;
    }

    #root {
      display: flex;
      flex: 1;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Glassmorphism ── */
    .glass-card {
      background: var(--fg-surface);
      border: 1px solid var(--fg-glass-border);
      border-radius: 18px;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--fg-sidebar-bg);
      border-right: 1px solid var(--fg-glass-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 10;
      padding: 14px;
    }
    .sidebar-brand { padding: 16px 12px 22px; display: flex; align-items: center; gap: 14px; }
    .brand-mark { display: flex; align-items: center; gap: 12px; }
    .brand-logo { 
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .brand-name { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.03em; }
    .brand-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .sidebar-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px 16px;
    }
    .sidebar-status-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .nav-list { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      position: relative;
      display: flex; align-items: center; gap: 0.875rem; padding: 0.875rem 0.95rem;
      border-radius: 14px; cursor: pointer; color: var(--fg-muted);
      font-size: 1.05rem; font-weight: 600; transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
      overflow: hidden;
    }
    .nav-item svg { width: 20px; height: 20px; opacity: 0.86; }

    .nav-divider { height: 1px; background: var(--glass-border); margin: 12px 16px; }
    .shell-footer {
      margin-top: auto;
      margin: 16px 8px 8px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--fg-glass-bg);
      border: 1px solid var(--fg-glass-border);
    }
    .shell-footer-label {
      font-size: 11px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .shell-footer-value {
      font-size: 13px;
      color: var(--fg-text);
      font-weight: 700;
    }

    .nav-item-tab {
      flex: 1; border: none; border-radius: 10px; font-size: 11px; font-weight: 800;
      height: 36px; letter-spacing: 0.5px; background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nav-item-tab.active { background: var(--accent); color: #fff; }
    .nav-item-tab:hover:not(.active) { color: var(--text); background: var(--fg-surface-hover); }

    /* ── Main Area ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; min-width: 0; }
    .status-badge { 
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.875rem;
      border-radius: 1.5rem; font-size: 0.75rem; font-weight: 700;
      background: var(--fg-glass-bg); border: 1px solid var(--fg-glass-border);
    }
    .status-badge.active { color: #fff; background: var(--green); border-color: var(--green); }
    .status-badge.error { color: #fff; background: var(--red); border-color: var(--red); }

    #mainContent {
      flex: 1; overflow-y: auto; padding: 28px 40px 40px; max-width: 1480px;
      margin: 0 auto; width: 100%;
    }
    #mainContent::-webkit-scrollbar { width: 6px; }
    #mainContent::-webkit-scrollbar-track { background: transparent; }
    #mainContent::-webkit-scrollbar-thumb { background: var(--fg-glass-border); border-radius: 10px; }
    #mainContent::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

    /* ── Widgets ── */
    .widget-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 28px; }
    .widget-card { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .widget-title { font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    
    .stat-circle-container { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
    .stat-circle-svg { transform: rotate(-90deg); }
    .stat-circle-bg { fill: none; stroke: var(--fg-glass-border); stroke-width: 5; }
    .stat-circle-val { fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round; }
    .stat-circle-text { position: absolute; font-size: 18px; font-weight: 900; }

    .timer-display { font-size: 3rem; font-weight: 900; letter-spacing: -0.04em; color: var(--text); }

    /* Lists */
    /* ── Service Cards ── */
    .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .service-card {
      background: var(--fg-glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: visible;
    }
    .service-card:hover { 
      background: var(--fg-surface);
      border-color: var(--fg-glass-border);
    }
    .service-card.active {
      border-color: var(--fg-glass-border);
      background: var(--fg-surface);
    }

    /* ── Toggles & Controls ── */
    .toggle-switch-btn {
      position: relative;
      width: 72px;
      height: 32px;
      padding: 0;
      background: var(--fg-glass-bg);
      border: 1px solid var(--fg-glass-border);
      border-radius: 100px;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .toggle-switch-btn::before {
      content: "";
      position: absolute;
      left: 4px;
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
    }
    .toggle-switch-btn .on-text, .toggle-switch-btn .off-text {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toggle-switch-btn .on-text { left: 10px; opacity: 0; }
    .toggle-switch-btn .off-text { right: 12px; opacity: 0.6; color: var(--muted); }
    
    .toggle-switch-btn.active {
      background: var(--red);
      border-color: var(--red);
    }
    .toggle-switch-btn.active::before {
      transform: translateX(40px);
    }
    .toggle-switch-btn.active .on-text { opacity: 1; }
    .toggle-switch-btn.active .off-text { opacity: 0; }
    
    /* Category/Service specific color override if needed */
    .toggle-switch-btn.active[data-kind="category"] { background: var(--red); border-color: var(--red); }
    .toggle-switch-btn.active[data-kind="service"] { background: var(--red); border-color: var(--red); }
    .toggle-switch-btn.active[data-kind="domain"] { background: var(--red); border-color: var(--red); }

    .btn-icon {
      width: 32px; height: 32px; min-width:32px; min-height:32px; display: flex; align-items: center; justify-content: center;
      border-radius: 10px; background: var(--fg-glass-bg); color: var(--fg-muted); border: 1px solid var(--fg-glass-border);
      cursor: pointer; transition: all 0.2s; padding: 0;
    }
    .btn-icon:hover { color: var(--red); background: var(--fg-surface); border-color: var(--red); }
    .btn-icon:active { transform: scale(0.92); }

    .edit-limit {
      background: var(--fg-glass-bg);
      border: 1px solid var(--fg-glass-border);
      color: var(--fg-text);
      width: 60px;
      padding: 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      outline: none;
    }
    .edit-limit:focus { border-color: var(--accent); background: var(--fg-surface); }

    .stat-lbl { font-size: 11px; color: var(--fg-muted); font-weight: 600; }
    .name { font-size: 15px; font-weight: 800; color: var(--fg-text); }

    .btn-premium {
      background: var(--accent);
      color: #fff;
      border: 1px solid var(--fg-glass-border);
      padding: 10px 20px;
      border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s;
      box-shadow: none; outline: none; appearance: none;
    }
    .btn-premium:hover { opacity: 0.85; }
    
    .input-premium {
      background: var(--fg-glass-bg); border: 1px solid var(--fg-glass-border);
      color: var(--fg-text); padding: 12px 16px; border-radius: 8px;
      font-size: 14px; outline: none; transition: 0.2s;
      box-shadow: none; appearance: none; -webkit-appearance: none;
    }
    .input-premium:focus { background: var(--fg-surface); border-color: var(--accent); }

    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; margin-top: 20px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; }
    .bar-track { flex: 1; width: 100%; background: var(--fg-glass-bg); border: 1px solid var(--fg-glass-border); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
    .bar-fill { width: 100%; background: var(--accent); opacity: 0.2; transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .bar-fill.active { opacity: 1; background: var(--accent); }
    .bar-label { font-size: 11px; color: var(--muted); font-weight: 700; }

    /* Responsive */
    @media (max-width: 1024px) {
      .widget-grid { grid-template-columns: repeat(2, 1fr); }
      .service-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .widget-grid { grid-template-columns: 1fr; }
      .service-grid { grid-template-columns: 1fr; }
      #mainContent { padding: 24px; }
      .sidebar { width: 88px; padding: 10px; }
      .brand-name { display: none; }
      .brand-subtitle { display: none; }
      .sidebar-status-row { display: none; }
      .shell-footer { display: none; }
      .nav-item span { display: none; }
      .nav-item { justify-content: center; padding: 12px; }
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Staggered entrance for page elements */
    #mainContent .page-intro { animation: fadeIn 0.4s ease-out both; }
    #mainContent .glass-card { animation: fadeIn 0.4s ease-out both; animation-delay: 0.1s; }
    #mainContent .service-grid > .service-card:nth-child(n) { animation: fadeIn 0.4s ease-out both; }
    #mainContent .service-grid > .service-card:nth-child(1) { animation-delay: 0.1s; }
    #mainContent .service-grid > .service-card:nth-child(2) { animation-delay: 0.15s; }
    #mainContent .service-grid > .service-card:nth-child(3) { animation-delay: 0.2s; }
    #mainContent .service-grid > .service-card:nth-child(4) { animation-delay: 0.2s; }
    #mainContent .service-grid > .service-card:nth-child(n+5) { animation-delay: 0.25s; }
    
    .btn-premium:active { transform: scale(0.96); transition: transform 0.1s; }
    .nav-item:active { transform: scale(0.96); transition: transform 0.1s; }
    .toggle-switch-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .toggle-switch-btn:active { transform: scale(0.92); }

    .loader { 
      opacity: 0.5; 
      animation: fadeIn 0.4s ease-out forwards; 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s linear;
    }

    .focus-timer-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }

    .focus-timer-val {
      font-size: 5rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: -4px;
      line-height: 1;
    }

    .focus-timer-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.25em;
      margin-top: 12px;
    }

    .focus-presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 640px;
    }

    .focus-preset-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .focus-preset-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--accent);
    }

    .focus-preset-time {
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--text);
    }

    .focus-preset-tag {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .focus-status-msg {
        font-size: 15px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 40px;
        text-align: center;
        max-width: 400px;
        line-height: 1.6;
    }

    .focus-active-glow { display: none; }

    /* ── Settings Screen Enhancement ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .field-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }

    .enforcement-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 24px 0;
    }

    .enforcement-card {
      background: var(--fg-glass-bg);
      border: 1px solid var(--fg-glass-border);
      border-radius: 20px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .enforcement-card.active {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent);
      border-width: 2px;
    }

    .enforcement-level {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--fg-text);
    }

    .enforcement-tag {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
      letter-spacing: 0.1em;
    }

    .enforcement-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
      line-height: 1.5;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .settings-section-divider {
      height: 1px;
      background: var(--glass-border);
      margin: 40px 0;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease-out;
    }

    .modal {
      background: var(--bg-dark);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      width: 100%;
      max-width: 720px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .modal-content {
      padding: 32px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 24px 32px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: flex-end;
      gap: 16px;
    }

    .btn-tab {
      background: var(--fg-glass-bg);
      border: 1px solid var(--fg-glass-border);
      color: var(--fg-muted);
      line-height: 1;
    }

    .focus-timer-label {
      font-size: 12px;

      flex-direction: column;
    }

    .modal-header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .modal-content {
      padding: 32px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 24px 32px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: flex-end;
      gap: 16px;
    }

    .btn-tab {
      background: var(--fg-glass-bg);
      border: 1px solid var(--fg-glass-border);
      color: var(--fg-muted);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }



    /* ── Light Theme Cascade Fix ── */
    /* Must be AFTER :root to win the cascade */
    .light-theme {
      --bg-dark:    #ffffff;
      --bg-card:    #f4f4f5;
      --glass-border: #e5e5e5;
      --text:       #0d0d0d;
      --muted:      #6e6e80;
      --green:      #10b981;
      --red:        #ef4444;
      --yellow:     #f59e0b;
    }

    /* Force readable text + card contrast in light mode */
    .light-theme .glass-card,
    .light-theme .service-card,
    .light-theme .enforcement-card,
    .light-theme .focus-preset-card,
    .light-theme .app-card {
      color: var(--text);
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
    }

  </style>
</head>
<body class="is-full-page">
  <div id="root"></div>
  <script src="dashboard.js" type="module"></script>
</body>
</html>
